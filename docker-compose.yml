services:
  postgresdb:
    image: postgres:17
    restart: unless-stopped
    container_name: postgres-new

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dev

    ports:
      - "5432:5432"

    volumes:
      - pg_data:/var/lib/postgresql/data

  web:
    build: ./apps/web
    ports: ["3000:3000"]
    env_file: .env

  ore:
    build: ./apps/ore
    env_file: .env
    depends_on: [redis]

  redis:
    image: redis:7
    restart: unless-stopped
    container_name: redis
    ports:
      - "6379:6379"

volumes:
  pg_data:
